<!DOCTYPE html>
<html>
<head>
    <title>Product Landing Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(to right,#dbeafe,#f8fbff);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:380px;
            background:#fff;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            overflow:hidden;
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card img{
            width:100%;
            height:230px;
            object-fit:cover;
        }

        .content{
            padding:20px;
        }

        h2{
            color:#1f2937;
            margin-bottom:10px;
        }

        .price{
            color:#e63946;
            font-size:28px;
            font-weight:bold;
            margin:15px 0;
        }

        ul{
            text-align:left;
            margin:15px 0 20px 25px;
            line-height:1.8;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">

    <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=800" alt="Laptop">

    <div class="content">

        <h2>HP Pavilion 15</h2>

        <p><strong>Powerful Performance for Students & Professionals</strong></p>

        <ul>
            <li>13th Gen Intel Core i5 Processor</li>
            <li>16 GB DDR4 RAM</li>
            <li>512 GB NVMe SSD</li>
            <li>15.6" Full HD IPS Display</li>
            <li>Windows 11 + MS Office</li>
            <li>Backlit Keyboard</li>
            <li>Fingerprint Sensor</li>
        </ul>

        <div class="price">₹64,999</div>

        <button>Buy Now</button>

    </div>

</div>

</body>
</html>
